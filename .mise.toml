[tools]
typst = "0.14.2"

[tasks.build]
description = "Compile all Typst documents to PDF"
run = "typst compile --font-path fonts cv.typ W_Bisschoff_CV.pdf && typst compile --font-path fonts cv_embedded.typ W_Bisschoff_CV_embedded.pdf && typst compile --font-path fonts cv_enterprise.typ W_Bisschoff_CV_enterprise.pdf && typst compile --font-path fonts cover_letter.typ W_Bisschoff_Cover_Letter.pdf"

[tasks.build-cv]
description = "Compile general CV only"
run = "typst compile --font-path fonts cv.typ W_Bisschoff_CV.pdf"

[tasks.build-embedded]
description = "Compile embedded systems CV variant"
run = "typst compile --font-path fonts cv_embedded.typ W_Bisschoff_CV_embedded.pdf"

[tasks.build-enterprise]
description = "Compile enterprise CV variant"
run = "typst compile --font-path fonts cv_enterprise.typ W_Bisschoff_CV_enterprise.pdf"

[tasks.build-cover-letter]
description = "Compile cover letter"
run = "typst compile --font-path fonts cover_letter.typ W_Bisschoff_Cover_Letter.pdf"

[tasks.build-check]
description = "Validate all documents compile without errors (dry compile)"
run = "typst compile --font-path fonts cv.typ W_Bisschoff_CV.pdf && typst compile --font-path fonts cv_embedded.typ W_Bisschoff_CV_embedded.pdf && typst compile --font-path fonts cv_enterprise.typ W_Bisschoff_CV_enterprise.pdf && typst compile --font-path fonts cover_letter.typ W_Bisschoff_Cover_Letter.pdf"

[tasks.check]
description = "Run all verification checks (compile)"
depends = ["check-compile"]

[tasks.check-compile]
description = "Verify all documents compile without errors"
run = "typst compile --font-path fonts cv.typ W_Bisschoff_CV.pdf && typst compile --font-path fonts cv_embedded.typ W_Bisschoff_CV_embedded.pdf && typst compile --font-path fonts cv_enterprise.typ W_Bisschoff_CV_enterprise.pdf && typst compile --font-path fonts cover_letter.typ W_Bisschoff_Cover_Letter.pdf"

[tasks.lint]
description = "Validate Typst syntax via compilation check"
run = "typst compile --font-path fonts cv.typ /dev/null && typst compile --font-path fonts cover_letter.typ /dev/null"

[tasks.dev]
description = "Watch and recompile general CV on changes"
run = "typst watch --font-path fonts cv.typ W_Bisschoff_CV.pdf"

[tasks.dev-embedded]
description = "Watch and recompile embedded CV on changes"
run = "typst watch --font-path fonts cv_embedded.typ W_Bisschoff_CV_embedded.pdf"

[tasks.dev-enterprise]
description = "Watch and recompile enterprise CV on changes"
run = "typst watch --font-path fonts cv_enterprise.typ W_Bisschoff_CV_enterprise.pdf"

[tasks.clean]
description = "Remove generated PDF artifacts"
run = "rm -f W_Bisschoff_CV.pdf W_Bisschoff_CV_embedded.pdf W_Bisschoff_CV_enterprise.pdf W_Bisschoff_Cover_Letter.pdf"

[tasks.setup]
description = "Verify mise toolchain and typst version"
run = "mise install && typst --version"

[tasks.help]
description = "List available mise tasks"
run = "mise tasks --no-header"
