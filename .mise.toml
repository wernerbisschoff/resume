[env]                                                                                                                                          
_.path = ["/Users/werner/.local/share/mise/installs/node/lts/bin"]

[tools]
typst = "0.14.2"
node = "22.13.0"

[tasks.build]
description = "Compile all Typst documents to PDF"
run = "typst compile --font-path fonts cv.typ W_Bisschoff_CV.pdf && typst compile --font-path fonts cv_systems.typ W_Bisschoff_CV_systems.pdf && typst compile --font-path fonts cv_infrastructure.typ W_Bisschoff_CV_infrastructure.pdf && typst compile --font-path fonts cv_head_of_systems.typ W_Bisschoff_CV_head_of_systems.pdf && typst compile --font-path fonts cover_letter.typ W_Bisschoff_Cover_Letter.pdf && typst compile --font-path fonts cover_letter_head_of_systems.typ W_Bisschoff_Cover_Letter_head_of_systems.pdf"

[tasks.build-cv]
description = "Compile general CV only"
run = "typst compile --font-path fonts cv.typ W_Bisschoff_CV.pdf"

[tasks.build-systems]
description = "Compile systems CV variant"
run = "typst compile --font-path fonts cv_systems.typ W_Bisschoff_CV_systems.pdf"

[tasks.build-infrastructure]
description = "Compile infrastructure CV variant"
run = "typst compile --font-path fonts cv_infrastructure.typ W_Bisschoff_CV_infrastructure.pdf"

[tasks.build-head-of-systems]
description = "Compile Head of Systems CV variant"
run = "typst compile --font-path fonts cv_head_of_systems.typ W_Bisschoff_CV_head_of_systems.pdf"

[tasks.build-cover-letter]
description = "Compile cover letter"
run = "typst compile --font-path fonts cover_letter.typ W_Bisschoff_Cover_Letter.pdf"

[tasks.build-cover-letter-head-of-systems]
description = "Compile Head of Systems cover letter"
run = "typst compile --font-path fonts cover_letter_head_of_systems.typ W_Bisschoff_Cover_Letter_head_of_systems.pdf"

[tasks.build-check]
description = "Validate all documents compile without errors"
run = "typst compile --font-path fonts cv.typ W_Bisschoff_CV.pdf && typst compile --font-path fonts cv_systems.typ W_Bisschoff_CV_systems.pdf && typst compile --font-path fonts cv_infrastructure.typ W_Bisschoff_CV_infrastructure.pdf && typst compile --font-path fonts cv_head_of_systems.typ W_Bisschoff_CV_head_of_systems.pdf && typst compile --font-path fonts cover_letter.typ W_Bisschoff_Cover_Letter.pdf && typst compile --font-path fonts cover_letter_head_of_systems.typ W_Bisschoff_Cover_Letter_head_of_systems.pdf"

[tasks.check-yaml]
description = "Validate YAML files"
run = "yamllint content/*.yaml"

[tasks.check]
description = "Run all verification checks (compile + YAML validation)"
depends = ["check-yaml", "check-compile"]

[tasks.check-compile]
description = "Verify all documents compile without errors"
run = "typst compile --font-path fonts cv.typ W_Bisschoff_CV.pdf && typst compile --font-path fonts cv_systems.typ W_Bisschoff_CV_systems.pdf && typst compile --font-path fonts cv_infrastructure.typ W_Bisschoff_CV_infrastructure.pdf && typst compile --font-path fonts cv_head_of_systems.typ W_Bisschoff_CV_head_of_systems.pdf && typst compile --font-path fonts cover_letter.typ W_Bisschoff_Cover_Letter.pdf && typst compile --font-path fonts cover_letter_head_of_systems.typ W_Bisschoff_Cover_Letter_head_of_systems.pdf"

[tasks.lint]
description = "Validate all Typst source files compile without errors"
run = "typst compile --font-path fonts cv.typ /dev/null && typst compile --font-path fonts cv_systems.typ /dev/null && typst compile --font-path fonts cv_infrastructure.typ /dev/null && typst compile --font-path fonts cv_head_of_systems.typ /dev/null && typst compile --font-path fonts cover_letter.typ /dev/null && typst compile --font-path fonts cover_letter_head_of_systems.typ /dev/null"

[tasks.dev]
description = "Watch general CV and run Astro dev server (Ctrl-C stops both)"
run = """
typst watch --font-path fonts cv.typ W_Bisschoff_CV.pdf &
TYPST_PID=$!
trap 'kill $TYPST_PID 2>/dev/null' EXIT INT TERM
cd website && pnpm dev
"""

[tasks.dev-systems]
description = "Watch and recompile systems CV on changes"
run = "typst watch --font-path fonts cv_systems.typ W_Bisschoff_CV_systems.pdf"

[tasks.dev-infrastructure]
description = "Watch and recompile infrastructure CV on changes"
run = "typst watch --font-path fonts cv_infrastructure.typ W_Bisschoff_CV_infrastructure.pdf"

[tasks.clean]
description = "Remove generated PDF artifacts"
run = "rm -f W_Bisschoff_CV.pdf W_Bisschoff_CV_systems.pdf W_Bisschoff_CV_infrastructure.pdf W_Bisschoff_CV_head_of_systems.pdf W_Bisschoff_Cover_Letter.pdf W_Bisschoff_Cover_Letter_head_of_systems.pdf"

[tasks.setup]
description = "Install all tools and dependencies for both projects"
run = "mise install && pnpm --prefix website install && typst --version && mise run hooks"

[tasks.hooks]
description = "Install git hooks from .githooks/ into repo hooks directory"
run = '''
HOOKS_DIR="$(git rev-parse --git-path hooks)"
cp .githooks/pre-commit "$HOOKS_DIR/pre-commit"
cp .githooks/pre-push "$HOOKS_DIR/pre-push"
chmod +x "$HOOKS_DIR/pre-commit" "$HOOKS_DIR/pre-push"
echo "✅ Git hooks installed"
'''

[tasks.uninstall-hooks]
description = "Remove git hooks"
run = '''
HOOKS_DIR="$(git rev-parse --git-path hooks)"
rm -f "$HOOKS_DIR/pre-commit" "$HOOKS_DIR/pre-push"
echo "✅ Git hooks removed"
'''

[tasks.test]
description = "Run T002 YAML adapter integration tests"
run = "bash tests/test_yaml_adapter.sh"

[tasks.help]
description = "List available mise tasks"
run = "mise tasks --no-header"

# ──────────────────────────────────────────────
# Website (Astro) delegation tasks
# ──────────────────────────────────────────────

[tasks.website-setup]
description = "Install website dependencies (Node + pnpm)"
dir = "website"
run = "mise install && pnpm install"

[tasks.website-check]
description = "Run all website validation checks"
dir = "website"
run = "mise run check"

[tasks.website-build]
description = "Build website for production"
dir = "website"
run = "mise run build"

[tasks.website-lint]
description = "Lint website source code"
dir = "website"
run = "mise run lint"

[tasks.website-fix]
description = "Auto-fix website code issues"
dir = "website"
run = "mise run fix"

[tasks.website-clean]
description = "Remove website build artifacts"
dir = "website"
run = "mise run clean"

[tasks.website-dev]
description = "Start website development server"
dir = "website"
run = "mise run dev"

# ──────────────────────────────────────────────
# Unified monorepo tasks
# ──────────────────────────────────────────────

[tasks.fix]
description = "Run all checks for both CV and website"
depends = ["check", "website-check"]

[tasks.build-all]
description = "Build both CV PDFs and website for production"
depends = ["build", "website-build"]
