site:
  name: Werner Bisschoff
  site: 'https://werner.bisschoff.dev'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: orcPxI47GSa-cRvY11tUe6iGg2IO_RPvnA1q95iEM3M

# Default SEO metadata — pages provide their own full title via frontmatter
# metadata.title with `ignoreTitleTemplate: true`. The template here is the
# minimal fallback when a page omits a title.
metadata:
  title:
    default: Werner Bisschoff — Software Engineer
    template: '%s — Werner Bisschoff'
  description: 'Werner Bisschoff is a software engineer in Cape Town, South Africa — embedded systems, systems engineering, infrastructure engineering, test-driven development, and agentic AI workflows. Open to freelance, contract, and remote work internationally.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Werner Bisschoff
    images:
      - url: '/images/werner-bisschoff-software-engineer.webp'
        width: 1200
        height: 1200
        alt: 'Werner Bisschoff - Software Engineer'
    type: website
  twitter:
    handle: '@wbisschoffdev'
    site: '@wbisschoffdev'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/notes/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'notes' # Notes main path
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: false
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: G-3Y4G3T4PXC # Add your GA4 Measurement ID (e.g., "G-XXXXXXXXXX")
      partytown: false # GA4 loaded directly (better Lighthouse score)

ui:
  theme: 'dark:only' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
