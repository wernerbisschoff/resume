[build]
publish = "dist"
command = "npm run build"
[build.processing.html]
pretty_urls = false
[[headers]]
for = "/_astro/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
[[redirects]]
from = "/blog"
to = "/notes"
status = 301
[[redirects]]
from = "/blog/*"
to = "/notes/:splat"
status = 301