name: Release CV

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        entry:
          - source: cv.typ
            output: W_Bisschoff_CV.pdf
          - source: cv_systems.typ
            output: W_Bisschoff_CV_systems.pdf
          - source: cv_infrastructure.typ
            output: W_Bisschoff_CV_infrastructure.pdf
          - source: cover_letter.typ
            output: W_Bisschoff_Cover_Letter.pdf
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: sudo apt-get update -qq && sudo apt-get install -y -qq yamllint

      - name: Validate YAML files
        run: yamllint content/*.yaml

      - name: Install fonts
        run: |
          mkdir -p ~/.fonts
          cp fonts/*.ttf ~/.fonts/
          fc-cache -fv ~/.fonts

      - name: Setup Typst
        uses: typst-community/setup-typst@v5

      - name: Build ${{ matrix.entry.output }}
        run: typst compile ${{ matrix.entry.source }} ${{ matrix.entry.output }}

      - name: Upload ${{ matrix.entry.output }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.entry.output }}
          path: ${{ matrix.entry.output }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          name: CV ${{ steps.version.outputs.version }}
          body: |
            ## Werner Bisschoff - Curriculum Vitae

            **Version:** ${{ steps.version.outputs.version }}

            **Built from commit:** ${{ github.sha }}

            This release includes:
            - **W_Bisschoff_CV.pdf** - The full professional CV
            - **W_Bisschoff_CV_systems.pdf** - Tailored for systems/edge
            - **W_Bisschoff_CV_infrastructure.pdf** - Tailored for infrastructure/cloud
            - **W_Bisschoff_Cover_Letter.pdf** - Professional cover letter
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
